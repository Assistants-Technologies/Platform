version: v1.0.0

dsn: postgres://kratos:kratossecret@postgres:5432/kratos?sslmode=disable

session:
  cookie:
    domain: localhost

cookies:
  domain: localhost

serve:
  public:
    base_url: http://localhost:4433 #https://idp.assts.site
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
        - https://id.assts.site
        - https://idp.assts.site
        - https://oauth.assts.site
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3000 #https://id.assts.site/
  allowed_return_urls:
    - http://localhost:3000
    - https://id.assts.site

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      passwordless_enabled: true
    
    passkey:
      enabled: true
      config:
        rp:
          display_name: Assistants Identity
          id: localhost #assts.site
          origins:
            - http://localhost:3000
            - https://id.assts.site

  flows:
    error:
      ui_url: http://localhost:3000/error

    settings:
      ui_url: http://localhost:3000/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: http://localhost:3000/recovery
      use: code

    verification:
      enabled: true
      ui_url: http://localhost:3000/verification
      use: code
      after:
        default_browser_return_url: http://localhost:3000/

    logout:
      after:
        default_browser_return_url: http://localhost:3000/login

    login:
      ui_url: http://localhost:3000/login
      lifespan: 10m

    registration:
      lifespan: 10m
      ui_url: http://localhost:3000/registration
      after:
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 10

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://mailslurper:1025/?skip_ssl_verify=true

feature_flags:
  use_continue_with_transitions: true